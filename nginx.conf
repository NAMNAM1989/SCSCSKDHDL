# nginx.conf — template; ${PORT} sẽ được envsubst thay bằng biến Railway inject
server {
    listen       ${PORT};
    listen       [::]:${PORT};
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # SPA fallback — cutoff là single-page, nếu user refresh URL con
    # vẫn trả về index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache tĩnh (các asset js/css/img) 7 ngày
    location ~* \.(?:css|js|jpg|jpeg|png|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Không cache HTML (để user luôn nhận bản mới sau khi redeploy)
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Ẩn thông tin nginx version
    server_tokens off;

    # Health check cho Railway
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
